<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipbook PDF - SMK Gajah Mada Banyuwangi</title>
    
    <!-- Library untuk Flipbook -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/page-flip@0.3.4/dist/css/page-flip.min.css">
    <script src="https://cdn.jsdelivr.net/npm/page-flip@0.3.4/dist/js/page-flip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        #container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #flipbook {
            width: 100%;
            height: 100%;
            background: #2a2a2a;
            position: relative;
        }

        .page-wrapper {
            background: white;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .page-wrapper canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        #loading {
            color: white;
            text-align: center;
            font-size: 1.2rem;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            padding: 30px 50px;
            border-radius: 15px;
            border: 2px solid #f1c40f;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid #f1c40f;
            border-top: 5px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .nav-controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.9);
            padding: 12px 25px;
            border-radius: 50px;
            border: 2px solid #f1c40f;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }

        .nav-btn {
            background: #f1c40f;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            min-width: 50px;
        }

        .nav-btn:hover {
            background: #ffd700;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.3);
        }

        .nav-btn:active {
            transform: scale(0.95);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
        }

        .page-info {
            color: white;
            font-size: 0.95rem;
            min-width: 120px;
            text-align: center;
            font-weight: bold;
            padding: 0 10px;
        }

        .page-info span {
            color: #f1c40f;
            font-size: 1.1rem;
        }

        .page-info .total {
            color: #aaa;
        }

        @media (max-width: 768px) {
            .nav-controls {
                gap: 8px;
                padding: 10px 15px;
                border-radius: 25px;
                bottom: 15px;
                flex-wrap: wrap;
                justify-content: center;
                max-width: 95vw;
            }
            .nav-btn {
                padding: 6px 12px;
                font-size: 0.7rem;
                min-width: 40px;
            }
            .page-info {
                font-size: 0.75rem;
                min-width: 80px;
            }
        }
    </style>
</head>
<body>

    <div id="loading">
        <div class="loader"></div>
        <p style="margin-top: 15px;">📄 Memuat PDF untuk Flipbook...</p>
        <p style="font-size: 0.9rem; color: #aaa; margin-top: 5px;">Mohon tunggu sebentar</p>
    </div>

    <div id="container">
        <div id="flipbook"></div>
    </div>

    <div class="nav-controls" id="nav-ui" style="display: none;">
        <button class="nav-btn" id="btn-prev">◀</button>
        <div class="page-info">
            <span id="page-current">1</span> / <span class="total" id="page-total">0</span>
        </div>
        <button class="nav-btn" id="btn-next">▶</button>
    </div>

    <script>
        const pdfUrl = 'presentasi.pdf';
        const flipbookContainer = document.getElementById('flipbook');
        const loadingDiv = document.getElementById('loading');
        const navUI = document.getElementById('nav-ui');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const pageCurrent = document.getElementById('page-current');
        const pageTotal = document.getElementById('page-total');

        let pageFlip = null;
        let totalPages = 0;

        async function loadPDF() {
            const pdfjsLib = window['pdfjs-dist/build/pdf'];
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

            try {
                const pdf = await pdfjsLib.getDocument(pdfUrl).promise;
                totalPages = pdf.numPages;
                pageTotal.textContent = totalPages;

                // Konversi setiap halaman PDF ke canvas
                const pages = [];
                for (let i = 1; i <= totalPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 2.5 });
                    
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    
                    await page.render({ canvasContext: context, viewport: viewport }).promise;
                    
                    // Buat wrapper untuk setiap halaman
                    const wrapper = document.createElement('div');
                    wrapper.className = 'page-wrapper';
                    wrapper.appendChild(canvas);
                    pages.push(wrapper);
                }

                // Sembunyikan loading dan tampilkan flipbook
                loadingDiv.style.display = 'none';
                navUI.style.display = 'flex';

                // Inisialisasi flipbook
                initFlipbook(pages);

            } catch (error) {
                console.error('Error loading PDF:', error);
                loadingDiv.innerHTML = `
                    <div style="color:#ff6b6b; padding:20px; max-width: 500px; line-height: 1.8;">
                        <p><b>❌ Gagal memuat PDF</b></p>
                        <p style="font-size: 0.9rem; color: #ccc; text-align: left;">
                            1. Pastikan file <b>presentasi.pdf</b> ada di folder yang sama<br>
                            2. Gunakan <b>Live Server</b> di VS Code<br>
                            3. Periksa konsol browser untuk detail error
                        </p>
                        <button onclick="location.reload()" style="margin-top:15px; padding:10px 30px; background:#f1c40f; border:none; border-radius:25px; cursor:pointer; font-weight:bold;">
                            🔄 Coba Lagi
                        </button>
                    </div>
                `;
            }
        }

        function initFlipbook(pages) {
            // Hitung ukuran berdasarkan container
            const container = document.getElementById('flipbook');
            const width = container.clientWidth || window.innerWidth;
            const height = container.clientHeight || window.innerHeight;

            // Tambahkan semua halaman ke container
            pages.forEach(page => {
                flipbookContainer.appendChild(page);
            });

            // Inisialisasi Page-Flip
            pageFlip = new St.PageFlip(flipbookContainer, {
                width: width,
                height: height,
                size: 'stretch',
                minWidth: 100,
                maxWidth: 3000,
                minHeight: 100,
                maxHeight: 3000,
                showCover: false,
                maxShadowOpacity: 0.5,
                mobileScrollSupport: true,
                clickEventForward: false,
                useMouseEvents: true,
                autoSize: true,
                startPage: 0
            });

            // Load halaman
            pageFlip.loadFromHTML(document.querySelectorAll('.page-wrapper'));

            // Event listener saat flip
            pageFlip.on('flip', (e) => {
                pageCurrent.textContent = e.data + 1;
                updateButtons();
            });

            // Event listener saat halaman berubah
            pageFlip.on('changeState', (e) => {
                if (e.data === 'user_fold' || e.data === 'flipping') {
                    // Sedang animasi
                }
            });

            // Tombol navigasi
            btnNext.addEventListener('click', () => {
                if (pageFlip) pageFlip.flipNext();
            });

            btnPrev.addEventListener('click', () => {
                if (pageFlip) pageFlip.flipPrev();
            });

            // Keyboard shortcut
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight' || e.key === ' ') {
                    e.preventDefault();
                    if (pageFlip && pageFlip.getCurrentPageIndex() < totalPages - 1) {
                        pageFlip.flipNext();
                    }
                } else if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    if (pageFlip && pageFlip.getCurrentPageIndex() > 0) {
                        pageFlip.flipPrev();
                    }
                }
            });

            // Update tombol setelah inisialisasi
            setTimeout(updateButtons, 100);

            // Handle resize
            let resizeTimeout;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    if (pageFlip) {
                        const w = container.clientWidth;
                        const h = container.clientHeight;
                        pageFlip.updateSize(w, h);
                    }
                }, 200);
            });
        }

        function updateButtons() {
            if (!pageFlip) return;
            const current = pageFlip.getCurrentPageIndex();
            btnPrev.disabled = current <= 0;
            btnNext.disabled = current >= totalPages - 1;
        }

        // Jalankan loading PDF
        loadPDF();
    </script>
</body>
</html>
