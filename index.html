<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipbook PDF - SMK Gajah Mada Banyuwangi</title>
    
    <!-- Library PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
            user-select: none;
        }

        #container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: #2a2a2a;
        }

        #flipbook {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .page-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: left center;
            backface-visibility: hidden;
            pointer-events: none;
        }

        .page-container.active {
            pointer-events: auto;
        }

        .page-container.hidden {
            display: none;
        }

        .page-container.flipping {
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .page-content {
            background: white;
            width: 95%;
            height: 95%;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            overflow: hidden;
            position: relative;
        }

        .page-content canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .page-shadow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: linear-gradient(to right, rgba(0,0,0,0.2) 0%, transparent 40%);
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .page-container.flipping .page-shadow {
            opacity: 1;
        }

        #loading {
            color: white;
            text-align: center;
            font-size: 1.2rem;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            background: rgba(0,0,0,0.85);
            padding: 30px 50px;
            border-radius: 15px;
            border: 2px solid #f1c40f;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid #f1c40f;
            border-top: 5px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .nav-controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.9);
            padding: 12px 25px;
            border-radius: 50px;
            border: 2px solid #f1c40f;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }

        .nav-btn {
            background: #f1c40f;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            min-width: 50px;
        }

        .nav-btn:hover {
            background: #ffd700;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.3);
        }

        .nav-btn:active {
            transform: scale(0.95);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
        }

        .page-info {
            color: white;
            font-size: 0.95rem;
            min-width: 120px;
            text-align: center;
            font-weight: bold;
            padding: 0 10px;
        }

        .page-info span {
            color: #f1c40f;
            font-size: 1.1rem;
        }

        .page-info .total {
            color: #aaa;
        }

        @media (max-width: 768px) {
            .nav-controls {
                gap: 8px;
                padding: 10px 15px;
                border-radius: 25px;
                bottom: 15px;
                flex-wrap: wrap;
                justify-content: center;
                max-width: 95vw;
            }
            .nav-btn {
                padding: 6px 12px;
                font-size: 0.7rem;
                min-width: 40px;
            }
            .page-info {
                font-size: 0.75rem;
                min-width: 80px;
            }
            .page-content {
                width: 98%;
                height: 98%;
            }
        }
    </style>
</head>
<body>

    <div id="loading">
        <div class="loader"></div>
        <p style="margin-top: 15px;">📄 Memuat PDF...</p>
        <p style="font-size: 0.9rem; color: #aaa; margin-top: 5px;">Mohon tunggu sebentar</p>
    </div>

    <div id="container">
        <div id="flipbook"></div>
    </div>

    <div class="nav-controls" id="nav-ui" style="display: none;">
        <button class="nav-btn" id="btn-prev">◀</button>
        <div class="page-info">
            <span id="page-current">1</span> / <span class="total" id="page-total">0</span>
        </div>
        <button class="nav-btn" id="btn-next">▶</button>
    </div>

    <script>
        const pdfUrl = 'presentasi.pdf';
        const flipbookContainer = document.getElementById('flipbook');
        const loadingDiv = document.getElementById('loading');
        const navUI = document.getElementById('nav-ui');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const pageCurrent = document.getElementById('page-current');
        const pageTotal = document.getElementById('page-total');

        let currentPage = 0;
        let totalPages = 0;
        let isFlipping = false;
        let pages = [];

        async function loadPDF() {
            const pdfjsLib = window['pdfjs-dist/build/pdf'];
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

            try {
                const pdf = await pdfjsLib.getDocument(pdfUrl).promise;
                totalPages = pdf.numPages;
                pageTotal.textContent = totalPages;

                // Render semua halaman
                for (let i = 1; i <= totalPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 2 });
                    
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    
                    await page.render({ canvasContext: context, viewport: viewport }).promise;
                    
                    // Buat container halaman
                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'page-container';
                    if (i === 1) pageDiv.classList.add('active');
                    
                    const content = document.createElement('div');
                    content.className = 'page-content';
                    content.appendChild(canvas);
                    
                    const shadow = document.createElement('div');
                    shadow.className = 'page-shadow';
                    
                    pageDiv.appendChild(content);
                    pageDiv.appendChild(shadow);
                    flipbookContainer.appendChild(pageDiv);
                    pages.push(pageDiv);
                }

                // Sembunyikan loading
                loadingDiv.style.display = 'none';
                navUI.style.display = 'flex';
                
                updateButtons();

            } catch (error) {
                console.error('Error:', error);
                loadingDiv.innerHTML = `
                    <div style="color:#ff6b6b; padding:20px; max-width: 500px; line-height: 1.8;">
                        <p><b>❌ Gagal memuat PDF</b></p>
                        <p style="font-size: 0.9rem; color: #ccc; text-align: left;">
                            1. Pastikan file <b>presentasi.pdf</b> ada di folder yang sama<br>
                            2. Gunakan <b>Live Server</b> di VS Code<br>
                            3. Periksa konsol browser (F12) untuk detail
                        </p>
                        <button onclick="location.reload()" style="margin-top:15px; padding:10px 30px; background:#f1c40f; border:none; border-radius:25px; cursor:pointer; font-weight:bold;">
                            🔄 Coba Lagi
                        </button>
                    </div>
                `;
            }
        }

        function goToPage(index) {
            if (isFlipping || index === currentPage || index < 0 || index >= totalPages) return;
            
            isFlipping = true;
            const direction = index > currentPage ? 'next' : 'prev';
            const fromPage = pages[currentPage];
            const toPage = pages[index];
            
            // Sembunyikan semua halaman
            pages.forEach(p => {
                p.classList.remove('active', 'flipping');
                p.style.display = 'none';
            });
            
            // Tampilkan halaman tujuan
            toPage.style.display = 'flex';
            toPage.classList.add('active');
            
            // Animasi flip sederhana
            if (direction === 'next') {
                fromPage.style.transform = 'perspective(1500px) rotateY(-10deg) scale(0.95)';
                fromPage.style.opacity = '0.8';
            } else {
                fromPage.style.transform = 'perspective(1500px) rotateY(10deg) scale(0.95)';
                fromPage.style.opacity = '0.8';
            }
            
            setTimeout(() => {
                currentPage = index;
                pageCurrent.textContent = currentPage + 1;
                updateButtons();
                isFlipping = false;
                
                // Reset transform halaman sebelumnya
                fromPage.style.transform = '';
                fromPage.style.opacity = '';
                fromPage.style.display = 'none';
                toPage.style.display = 'flex';
                toPage.classList.add('active');
            }, 400);
        }

        function nextPage() {
            if (currentPage < totalPages - 1) {
                goToPage(currentPage + 1);
            }
        }

        function prevPage() {
            if (currentPage > 0) {
                goToPage(currentPage - 1);
            }
        }

        function updateButtons() {
            btnPrev.disabled = currentPage <= 0;
            btnNext.disabled = currentPage >= totalPages - 1;
        }

        // Event listeners
        btnNext.addEventListener('click', nextPage);
        btnPrev.addEventListener('click', prevPage);

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                nextPage();
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevPage();
            }
        });

        // Click pada halaman untuk flip
        document.addEventListener('click', (e) => {
            const rect = flipbookContainer.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const midX = rect.width / 2;
            
            if (x > midX + 50) {
                nextPage();
            } else if (x < midX - 50) {
                prevPage();
            }
        });

        // Touch support
        let touchStartX = 0;
        let touchEndX = 0;
        
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        });
        
        document.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            const diff = touchStartX - touchEndX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) {
                    nextPage();
                } else {
                    prevPage();
                }
            }
        });

        // Handle resize
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                // Re-render halaman saat ini
                if (pages.length > 0) {
                    const currentPageDiv = pages[currentPage];
                    if (currentPageDiv) {
                        currentPageDiv.style.display = 'flex';
                        currentPageDiv.classList.add('active');
                    }
                }
            }, 300);
        });

        // Jalankan
        loadPDF();
    </script>
</body>
</html>
