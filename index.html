<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 PDF Flipbook</title>
    
    <!-- Library Page-Flip -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    <!-- Library PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #333;
            font-family: sans-serif;
        }

        #canvas-container {
            width: 90vw;
            height: 90vh;
            display: none; /* Sembunyikan sampai PDF dimuat */
        }

        .page-content {
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #loading {
            color: white;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

    <div id="loading">Memuat PDF...</div>
    
    <!-- Wadah Flipbook -->
    <div id="book-container">
        <div id="my-flipbook"></div>
    </div>

    <script>
        // GANTI INI dengan lokasi file PDF Anda
        const pdfUrl = 'https://github.com/smksgajahmadabwi/presentasi5harikerja/blob/main/presentasi.pdf';

        const flipbookContainer = document.getElementById('my-flipbook');
        const loadingText = document.getElementById('loading');

        async function renderPDF() {
            const pdfjsLib = window['pdfjs-dist/build/pdf'];
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

            try {
                const pdf = await pdfjsLib.getDocument(pdfUrl).promise;
                const totalPages = pdf.numPages;

                // Loop setiap halaman PDF dan buat elemen canvas
                for (let i = 1; i <= totalPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 1.5 });

                    const canvas = document.createElement('canvas');
                    canvas.className = 'page-content';
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    await page.render({ canvasContext: context, viewport: viewport }).promise;
                    
                    // Masukkan canvas ke dalam div flipbook
                    const pageDiv = document.createElement('div');
                    pageDiv.appendChild(canvas);
                    flipbookContainer.appendChild(pageDiv);
                }

                initFlipbook();
            } catch (error) {
                console.error("Error loading PDF: ", error);
                loadingText.innerText = "Gagal memuat PDF. Pastikan URL benar dan izin CORS tersedia.";
            }
        }

        function initFlipbook() {
            loadingText.style.display = 'none';
            
            const pageFlip = new St.PageFlip(flipbookContainer, {
                width: 600, // Ukuran lebar satu halaman
                height: 800, // Ukuran tinggi satu halaman
                size: "stretch",
                minWidth: 315,
                maxWidth: 1000,
                minHeight: 420,
                maxHeight: 1350,
                maxShadowOpacity: 0.5,
                showCover: true,
                mobileScrollSupport: false
            });

            pageFlip.loadFromHTML(document.querySelectorAll('.page-content'));
        }

        renderPDF();
    </script>
</body>
</html>
