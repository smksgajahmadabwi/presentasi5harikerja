<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Landscape - SMK Gajah Mada Banyuwangi</title>
    
    <!-- Library PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        #container {
            width: 100%;
            height: calc(100vh - 100px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #pdf-viewer {
            width: 100%;
            height: 100%;
            background: white;
            box-shadow: 0 0 40px rgba(0,0,0,0.7);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            object-fit: contain;
            max-width: 100%;
            max-height: 100%;
        }

        #loading {
            color: white;
            text-align: center;
            font-size: 1.2rem;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .nav-controls {
            position: fixed;
            bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.85);
            padding: 12px 25px;
            border-radius: 50px;
            border: 1px solid #f1c40f;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-btn {
            background: #f1c40f;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: transform 0.2s, background 0.2s;
            font-size: 0.85rem;
            min-width: 60px;
        }

        .nav-btn:hover {
            background: #d4ac0d;
            transform: scale(1.05);
        }

        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .page-info {
            color: white;
            font-size: 0.95rem;
            min-width: 120px;
            text-align: center;
            font-weight: bold;
        }

        .page-info span {
            color: #f1c40f;
        }

        .zoom-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            border-left: 1px solid #444;
            padding-left: 15px;
        }

        .zoom-btn {
            background: transparent;
            color: white;
            border: 1px solid #555;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .zoom-btn:hover {
            background: #f1c40f;
            color: #000;
            border-color: #f1c40f;
        }

        @media (max-width: 700px) {
            .nav-controls {
                gap: 10px;
                padding: 10px 15px;
                border-radius: 20px;
                bottom: 10px;
            }
            .nav-btn {
                padding: 6px 12px;
                font-size: 0.7rem;
                min-width: 45px;
            }
            .page-info {
                font-size: 0.75rem;
                min-width: 80px;
            }
            .zoom-controls {
                padding-left: 10px;
            }
            .zoom-btn {
                padding: 4px 8px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>

    <div id="loading">
        <p>📄 Sedang menyiapkan PDF...</p>
        <div style="margin-top: 10px; font-size: 0.9rem; color: #aaa;">Mohon tunggu sebentar</div>
    </div>

    <div id="container">
        <div id="pdf-viewer">
            <canvas id="pdf-canvas"></canvas>
        </div>
    </div>

    <div class="nav-controls" id="nav-ui">
        <button class="nav-btn" id="btn-first">⏮ First</button>
        <button class="nav-btn" id="btn-prev">◀ Prev</button>
        
        <div class="page-info">
            Halaman <span id="page-current">1</span> / <span id="page-total">0</span>
        </div>
        
        <button class="nav-btn" id="btn-next">Next ▶</button>
        <button class="nav-btn" id="btn-last">Last ⏭</button>
        
        <div class="zoom-controls">
            <button class="zoom-btn" id="btn-zoom-out">🔍−</button>
            <span style="color:white; font-size:0.8rem; min-width:40px; text-align:center;" id="zoom-level">100%</span>
            <button class="zoom-btn" id="btn-zoom-in">🔍+</button>
            <button class="zoom-btn" id="btn-reset" style="border-color:#f1c40f; color:#f1c40f;">↺</button>
        </div>
    </div>

    <script>
        const pdfUrl = 'presentasi.pdf';
        
        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');
        const loadingText = document.getElementById('loading');
        
        const btnFirst = document.getElementById('btn-first');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const btnLast = document.getElementById('btn-last');
        const btnZoomIn = document.getElementById('btn-zoom-in');
        const btnZoomOut = document.getElementById('btn-zoom-out');
        const btnReset = document.getElementById('btn-reset');
        
        const pageCurrent = document.getElementById('page-current');
        const pageTotal = document.getElementById('page-total');
        const zoomLevel = document.getElementById('zoom-level');

        let pdfDoc = null;
        let currentPage = 1;
        let currentScale = 1.0;
        let totalPages = 0;
        let fitScale = 1;

        async function renderPDF() {
            const pdfjsLib = window['pdfjs-dist/build/pdf'];
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

            try {
                const pdf = await pdfjsLib.getDocument(pdfUrl).promise;
                pdfDoc = pdf;
                totalPages = pdf.numPages;
                pageTotal.textContent = totalPages;
                loadingText.style.display = 'none';
                renderPage(currentPage);
                updateButtons();
            } catch (error) {
                console.error(error);
                loadingText.innerHTML = `
                    <div style="color:#ff6b6b; padding:20px; max-width: 500px; margin: 0 auto; line-height: 1.6; background: rgba(0,0,0,0.8); border-radius: 12px;">
                        <p><b>❌ Gagal memuat dokumen PDF.</b></p>
                        <p style="font-size: 0.9rem; text-align: left; color: #ccc; margin-top: 10px;">
                            1. Pastikan file <b>presentasi.pdf</b> berada di folder yang sama dengan file HTML ini.<br>
                            2. Pastikan penulisan nama file sudah sama persis.<br>
                            3. Gunakan lokal server seperti ekstensi <b>Live Server</b> di VS Code agar tidak diblokir oleh kebijakan keamanan browser.
                        </p>
                    </div>`;
            }
        }

        function renderPage(pageNum) {
            if (!pdfDoc) return;

            const container = document.getElementById('pdf-viewer');
            const containerWidth = container.clientWidth - 20;
            const containerHeight = container.clientHeight - 20;

            pdfDoc.getPage(pageNum).then(page => {
                const viewport = page.getViewport({ scale: 1 });
                
                // Hitung skala agar muat penuh di container
                const widthRatio = containerWidth / viewport.width;
                const heightRatio = containerHeight / viewport.height;
                fitScale = Math.min(widthRatio, heightRatio);
                
                const finalScale = fitScale * currentScale;
                const scaledViewport = page.getViewport({ scale: finalScale });
                
                // Set canvas size
                canvas.width = scaledViewport.width;
                canvas.height = scaledViewport.height;
                canvas.style.width = '100%';
                canvas.style.height = '100%';

                const renderContext = {
                    canvasContext: ctx,
                    viewport: scaledViewport
                };

                page.render(renderContext).promise.then(() => {
                    const percent = Math.round(currentScale * 100);
                    zoomLevel.textContent = percent + '%';
                    pageCurrent.textContent = pageNum;
                    updateButtons();
                });
            });
        }

        function updateButtons() {
            btnPrev.disabled = currentPage <= 1;
            btnFirst.disabled = currentPage <= 1;
            btnNext.disabled = currentPage >= totalPages;
            btnLast.disabled = currentPage >= totalPages;
        }

        function goToPage(pageNum) {
            if (pageNum < 1 || pageNum > totalPages) return;
            currentPage = pageNum;
            renderPage(currentPage);
        }

        // Navigasi Halaman
        btnFirst.addEventListener('click', () => goToPage(1));
        btnPrev.addEventListener('click', () => goToPage(currentPage - 1));
        btnNext.addEventListener('click', () => goToPage(currentPage + 1));
        btnLast.addEventListener('click', () => goToPage(totalPages));

        // Keyboard navigasi
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                if (currentPage < totalPages) goToPage(currentPage + 1);
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                if (currentPage > 1) goToPage(currentPage - 1);
            } else if (e.key === 'Home') {
                e.preventDefault();
                goToPage(1);
            } else if (e.key === 'End') {
                e.preventDefault();
                goToPage(totalPages);
            }
        });

        // Kontrol Zoom
        btnZoomIn.addEventListener('click', () => {
            currentScale = Math.min(currentScale + 0.1, 3.0);
            renderPage(currentPage);
        });

        btnZoomOut.addEventListener('click', () => {
            currentScale = Math.max(currentScale - 0.1, 0.3);
            renderPage(currentPage);
        });

        btnReset.addEventListener('click', () => {
            currentScale = 1.0;
            renderPage(currentPage);
        });

        // Zoom dengan mouse wheel
        document.getElementById('pdf-viewer').addEventListener('wheel', (e) => {
            if (e.ctrlKey || e.metaKey) {
                e.preventDefault();
                if (e.deltaY < 0) {
                    currentScale = Math.min(currentScale + 0.1, 3.0);
                } else {
                    currentScale = Math.max(currentScale - 0.1, 0.3);
                }
                renderPage(currentPage);
            }
        }, { passive: false });

        // Resize handler
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                if (pdfDoc) renderPage(currentPage);
            }, 200);
        });

        renderPDF();
    </script>
</body>
</html>
