<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentasi - SMK Gajah Mada Banyuwangi</title>
    
    <!-- Library Page-Flip & PDF.js -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        #container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 550px; /* Disesuaikan untuk tampilan satu halaman (portrait) */
            padding: 20px;
            margin-bottom: 80px; 
        }

        #my-flipbook {
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            display: none; 
            margin: 0 auto;
        }

        .page-wrapper {
            background-color: white;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #loading {
            color: white;
            text-align: center;
            margin-top: 50px;
            font-size: 1.1rem;
        }

        .nav-controls {
            position: fixed;
            bottom: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(0, 0, 0, 0.85);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid #f1c40f;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .nav-btn {
            background: #f1c40f;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: transform 0.2s, background 0.2s;
        }

        .nav-btn:hover {
            background: #d4ac0d;
            transform: scale(1.05);
        }

        .page-info {
            color: white;
            font-size: 0.9rem;
            min-width: 100px;
            text-align: center;
        }

        @media (max-width: 600px) {
            .nav-btn {
                padding: 8px 15px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>

    <div id="loading">
        <p>Sedang menyiapkan file PDF...</p>
    </div>

    <div id="container">
        <div id="my-flipbook"></div>
    </div>

    <div class="nav-controls" id="nav-ui" style="display: none;">
        <button class="nav-btn" id="btn-prev">PREV</button>
        <div class="page-info">
            Halaman: <span id="page-current">1</span> / <span id="page-total">0</span>
        </div>
        <button class="nav-btn" id="btn-next">NEXT</button>
    </div>

    <script>
        const pdfUrl = 'presentasi.pdf'; 
        
        const flipbookContainer = document.getElementById('my-flipbook');
        const loadingText = document.getElementById('loading');
        const navUI = document.getElementById('nav-ui');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const pageCurrent = document.getElementById('page-current');
        const pageTotal = document.getElementById('page-total');

        let pageFlip = null;

        async function renderPDF() {
            const pdfjsLib = window['pdfjs-dist/build/pdf'];
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

            try {
                const pdf = await pdfjsLib.getDocument(pdfUrl).promise;
                const totalPages = pdf.numPages;
                pageTotal.innerText = totalPages;

                const firstPage = await pdf.getPage(1);
                const standardViewport = firstPage.getViewport({ scale: 1.5 });
                const pageWidth = standardViewport.width;
                const pageHeight = standardViewport.height;

                for (let i = 1; i <= totalPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 1.5 });

                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'page-wrapper';
                    
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    await page.render({ canvasContext: context, viewport: viewport }).promise;
                    
                    pageDiv.appendChild(canvas);
                    flipbookContainer.appendChild(pageDiv);
                }

                initFlipbook(pageWidth, pageHeight);
            } catch (error) {
                console.error(error);
                loadingText.innerHTML = `
                    <div style="color:#ff6b6b; padding:20px; max-width: 500px; margin: 0 auto; line-height: 1.6;">
                        <p><b>Gagal memuat dokumen PDF.</b></p>
                        <p style="font-size: 0.9rem; text-align: left; color: #ccc;">
                            1. Pastikan file <b>presentasi.pdf</b> berada di folder yang sama dengan file HTML ini.<br>
                            2. Pastikan penulisan nama file sudah sama persis.<br>
                            3. Gunakan lokal server seperti ekstensi <b>Live Server</b> di VS Code jika dijalankan di komputer lokal agar tidak diblokir oleh kebijakan keamanan browser.
                        </p>
                    </div>`;
            }
        }

        function initFlipbook(width, height) {
            loadingText.style.display = 'none';
            flipbookContainer.style.display = 'block';
            navUI.style.display = 'flex';

            pageFlip = new St.PageFlip(flipbookContainer, {
                width: width, 
                height: height,
                mode: "portrait", // Diubah ke mode portrait untuk menampilkan 1 halaman saja
                size: "stretch",
                minWidth: 100, 
                maxWidth: 3000, 
                minHeight: 100,
                maxHeight: 3000, 
                showCover: false, 
                maxShadowOpacity: 0.2, 
                mobileScrollSupport: false,
                clickEventForward: false, 
                useMouseEvents: true 
            });

            pageFlip.loadFromHTML(document.querySelectorAll('.page-wrapper'));

            pageFlip.on('flip', (e) => {
                pageCurrent.innerText = e.data + 1;
            });

            btnNext.addEventListener('click', () => {
                pageFlip.flipNext();
            });

            btnPrev.addEventListener('click', () => {
                pageFlip.flipPrev();
            });
        }

        renderPDF();
    </script>
</body>
</html>
