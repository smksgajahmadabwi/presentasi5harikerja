<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Landscape - SMK Gajah Mada Banyuwangi</title>
    
    <!-- Library PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        #container {
            width: 100%;
            height: calc(100vh - 80px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #pdf-viewer {
            width: 100%;
            height: 100%;
            background: white;
            box-shadow: 0 0 40px rgba(0,0,0,0.7);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
        }

        #loading {
            color: white;
            text-align: center;
            font-size: 1.2rem;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .nav-controls {
            position: fixed;
            bottom: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(0, 0, 0, 0.85);
            padding: 12px 25px;
            border-radius: 50px;
            border: 1px solid #f1c40f;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .nav-btn {
            background: #f1c40f;
            color: #000;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: transform 0.2s, background 0.2s;
            font-size: 0.9rem;
        }

        .nav-btn:hover {
            background: #d4ac0d;
            transform: scale(1.05);
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .page-info {
            color: white;
            font-size: 0.9rem;
            min-width: 80px;
            text-align: center;
        }

        @media (max-width: 600px) {
            .nav-btn {
                padding: 8px 15px;
                font-size: 0.7rem;
            }
            .nav-controls {
                gap: 12px;
                padding: 10px 15px;
            }
        }
    </style>
</head>
<body>

    <div id="loading">
        <p>📄 Sedang menyiapkan PDF...</p>
        <div style="margin-top: 10px; font-size: 0.9rem; color: #aaa;">Mohon tunggu sebentar</div>
    </div>

    <div id="container">
        <div id="pdf-viewer">
            <canvas id="pdf-canvas"></canvas>
        </div>
    </div>

    <div class="nav-controls" id="nav-ui">
        <button class="nav-btn" id="btn-zoom-out">➖</button>
        <button class="nav-btn" id="btn-reset">⟲ Reset</button>
        <button class="nav-btn" id="btn-zoom-in">➕</button>
        <div class="page-info">
            <span id="zoom-level">100%</span>
        </div>
    </div>

    <script>
        const pdfUrl = 'presentasi.pdf';
        
        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');
        const loadingText = document.getElementById('loading');
        const zoomLevel = document.getElementById('zoom-level');
        const btnZoomIn = document.getElementById('btn-zoom-in');
        const btnZoomOut = document.getElementById('btn-zoom-out');
        const btnReset = document.getElementById('btn-reset');

        let pdfDoc = null;
        let currentScale = 1.0;
        const baseScale = 1.0;

        async function renderPDF() {
            const pdfjsLib = window['pdfjs-dist/build/pdf'];
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

            try {
                const pdf = await pdfjsLib.getDocument(pdfUrl).promise;
                pdfDoc = pdf;
                loadingText.style.display = 'none';
                renderPage(1);
            } catch (error) {
                console.error(error);
                loadingText.innerHTML = `
                    <div style="color:#ff6b6b; padding:20px; max-width: 500px; margin: 0 auto; line-height: 1.6; background: rgba(0,0,0,0.8); border-radius: 12px;">
                        <p><b>❌ Gagal memuat dokumen PDF.</b></p>
                        <p style="font-size: 0.9rem; text-align: left; color: #ccc; margin-top: 10px;">
                            1. Pastikan file <b>presentasi.pdf</b> berada di folder yang sama dengan file HTML ini.<br>
                            2. Pastikan penulisan nama file sudah sama persis.<br>
                            3. Gunakan lokal server seperti ekstensi <b>Live Server</b> di VS Code agar tidak diblokir oleh kebijakan keamanan browser.
                        </p>
                    </div>`;
            }
        }

        function renderPage(pageNum) {
            if (!pdfDoc) return;

            const container = document.getElementById('pdf-viewer');
            const containerWidth = container.clientWidth;
            const containerHeight = container.clientHeight;

            pdfDoc.getPage(pageNum).then(page => {
                // Hitung skala agar muat penuh di container (landscape)
                const viewport = page.getViewport({ scale: 1 });
                const widthRatio = containerWidth / viewport.width;
                const heightRatio = containerHeight / viewport.height;
                const fitScale = Math.min(widthRatio, heightRatio) * currentScale;

                const scaledViewport = page.getViewport({ scale: fitScale });
                
                canvas.width = scaledViewport.width;
                canvas.height = scaledViewport.height;
                canvas.style.width = '100%';
                canvas.style.height = '100%';

                const renderContext = {
                    canvasContext: ctx,
                    viewport: scaledViewport
                };

                page.render(renderContext).promise.then(() => {
                    zoomLevel.textContent = Math.round(fitScale / Math.min(widthRatio, heightRatio) * 100) + '%';
                });
            });
        }

        // Event resize untuk render ulang
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                if (pdfDoc) renderPage(1);
            }, 200);
        });

        // Kontrol zoom
        btnZoomIn.addEventListener('click', () => {
            currentScale = Math.min(currentScale + 0.1, 3.0);
            if (pdfDoc) renderPage(1);
        });

        btnZoomOut.addEventListener('click', () => {
            currentScale = Math.max(currentScale - 0.1, 0.3);
            if (pdfDoc) renderPage(1);
        });

        btnReset.addEventListener('click', () => {
            currentScale = 1.0;
            if (pdfDoc) renderPage(1);
        });

        // Keyboard shortcut
        document.addEventListener('keydown', (e) => {
            if (e.key === '+' || e.key === '=') {
                e.preventDefault();
                btnZoomIn.click();
            } else if (e.key === '-') {
                e.preventDefault();
                btnZoomOut.click();
            } else if (e.key === '0') {
                e.preventDefault();
                btnReset.click();
            }
        });

        // Render ulang saat pertama kali container terlihat
        setTimeout(() => {
            if (pdfDoc) renderPage(1);
        }, 100);

        renderPDF();
    </script>
</body>
</html>
